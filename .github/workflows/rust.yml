name: Rust lint and build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        BUILD_TARGET: [release] # refers to a cargo profile

    steps:
    - uses: actions/checkout@v4
    - uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Configure toolchain
      run: |
        rustup component add rustfmt clippy
        rustup component add --toolchain nightly-x86_64-unknown-linux-gnu rustfmt
    
    - name: Formatter check
      run: cargo +nightly fmt --check
    - name: Linter check
      run: cargo clippy --all-targets -- -D warnings
      
    - name: Build binaries in "${{ matrix.BUILD_TARGET }}" mode
      run: cargo build --profile ${{ matrix.BUILD_TARGET }}
    - name: Run unit-tests in "${{ matrix.BUILD_TARGET }}" mode
      run: cargo test --lib --profile ${{ matrix.BUILD_TARGET }}

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: mixer-operator-${{ matrix.BUILD_TARGET }}-${{ github.sha }}-ul
        path: target/${{ matrix.BUILD_TARGET }}/mixer-operator
