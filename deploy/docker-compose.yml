services:
  local-mixer-operator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      ssh:
        - default
    environment:
      RUST_BACKTRACE: 1 
      RUST_LOG: "sqlx=warn,mixer_operator=info,debug"
      ROCKET_ENV: development
      ROCKET_TQ: "{db_url=\"postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@local-postgres-db/${POSTGRES_DB}\"}"
    ports:
      - "8001:8001"
    depends_on:
      - local-postgres-db

  local-postgres-db:
    image: postgres:9.6-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/mixer-operator/postgres/data

volumes:
  postgres_data:

