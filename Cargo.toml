[package]
name = "mixer-operator"
version = "0.5.0"
edition = "2024"
rust-version = "1.88"
default-run = "mixer-operator"

[profile.release]
debug = true
lto = "thin"

[features]
default = ["tls"]
# enables rocket's built-in tls support
tls = ["rocket/tls"]

[dependencies]
anyhow = "1.0.98"
async-trait = "0.1.88"
bitflags = "2.9.1"
dotenvy = "0.15.7"
chrono = "0.4.41"
futures = "0.3.31"
glob = "0.3.2"
hex = "0.4.3"
once_cell = "1.21.3"
rand = "0.9.1"
rocket = { version = "0.5.1", features = ["json"] }
rocket_cors = "0.6.0"
rocket_okapi = { version = "0.9.0", features = ["swagger"] }
thiserror = "2.0.12"
tokio = "1.44.2"
tokio-util = "0.7.8"
tracing = { version = "0.1.41", features = ["max_level_trace", "release_max_level_info"] }
tracing-log = "0.2.0"
tracing-futures = { version = "0.2.5", default-features = false }
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }

diesel = { version = "2.0", features = ["sqlite", "r2d2", "chrono"] }
diesel_cli = { version = "2.0", optional = true }
deadpool-diesel = { version = "0.6.1", features = ["sqlite", "tracing"] }
diesel_migrations = { version = "2.2.0", features = ["sqlite"] }
fang = { git = "https://github.com/ayrat555/fang.git" , rev = "31a5ac64f86448e5ab736eaad227c366d4aece0a", features = ["asynk-postgres", "migrations-postgres" ], default-features = false }

miden-bridge = { git = "ssh://git@github.com/arcane-finance-defi/miden-bridge-mono.git", branch = "main", features = ["std", "async"] }
miden-client = { git = " ssh://git@github.com/arcane-finance-defi/miden-bridge-cli.git", branch = "main", features = ["tonic", "sqlite"] }
miden-objects = "0.10.0"