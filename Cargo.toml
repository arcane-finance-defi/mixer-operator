[package]
name = "mixer-operator"
version = "0.4.0"
edition = "2024"
rust-version = "1.87"
default-run = "mixer-operator"

[profile.release]
debug = true
lto = "thin"

[features]
default = ["tls"]
tls = ["rocket/tls"]

[dependencies]
anyhow = "1.0.98"
dotenvy = "0.15.7"
diesel = { version = "2.0", features = ["sqlite", "r2d2", "chrono"] }
diesel_cli = { version = "2.0", optional = true }
chrono = "0.4.41"
function_name = { git = "https://github.com/danielhenrymantilla/rust-function_name", version = "0.3.0" }
glob = "0.3.2"
hex = "0.4.3"
miden-bridge = { git = "ssh://git@github.com/arcane-finance-defi/miden-bridge-mono.git", version = "0.1.0", features = ["std", "async"] }
miden-client = { git = " ssh://git@github.com/arcane-finance-defi/miden-bridge-cli.git", features = ["tonic", "sqlite"] }
miden-objects = "0.10.0"
once_cell = "1.21.3"
rand = "0.9.1"
rocket = { version = "0.5.1", features = ["json"] }
rocket_cors = "0.6.0"
thiserror = "2.0.12"
tokio = "1.44.2"
tokio-util = "0.7.8"
tracing = { version = "0.1.41", features = ["max_level_trace", "release_max_level_info"] }
tracing-log = "0.2.0"
tracing-futures = { version = "0.2.5", default-features = false }
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
futures = "0.3.31"
deadpool-diesel = { version = "0.6.1", features = ["sqlite", "tracing"] }
bitflags = "2.9.1"
async-trait = "0.1.88"

[dev-dependencies]
dotenvy = "0.15.7"
